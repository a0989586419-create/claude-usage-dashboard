<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:760px;height:680px;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Helvetica Neue",sans-serif;
    background:
      radial-gradient(600px 500px at 20% 15%, #3a4d7a, transparent 60%),
      radial-gradient(700px 600px at 85% 90%, #6b4a7a, transparent 60%),
      linear-gradient(135deg,#1a2140,#2a2350 55%,#3a2a48)}
  .card{width:340px;border-radius:24px;overflow:hidden;color:#e6edf3;
    background:linear-gradient(157deg, rgba(30,37,52,0.90), rgba(14,18,27,0.92));
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:0 30px 70px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    padding:0 0 18px}
  .accent{height:4px;background:linear-gradient(90deg,#ff8c42,#ff6b9d,#9b8cff)}
  .pad{padding:0 22px}
  .head{display:flex;justify-content:space-between;align-items:center;padding-top:16px;padding-bottom:4px}
  .head .t{font-size:15.5px;font-weight:750;letter-spacing:.2px}
  .pill{font-size:11px;font-weight:700;color:#fff;padding:3px 11px;border-radius:20px;
    background:linear-gradient(135deg,#ff8c42,#ff6b9d)}
  .badge{font-size:10px;font-weight:750;color:#04150b;padding:2px 9px;border-radius:20px;margin-left:7px;
    background:linear-gradient(135deg,#7ee0a8,#3fb68b)}
  .gauges{display:flex;gap:8px;margin-top:8px}
  .g{flex:1;text-align:center}
  .g .lab{font-size:13.5px;color:#cdd6e0;font-weight:600;margin-top:2px}
  .g .sub{font-size:11px;color:#5b6675;margin-top:3px}
  .spark{display:flex;align-items:flex-end;gap:3px;height:30px;margin-top:14px}
  .spark div{flex:1;background:linear-gradient(180deg,#ffb37a,#ff8c42);border-radius:2.5px}
  .cap{font-size:11px;color:#5b6675;margin-top:4px}
  .foot{display:flex;justify-content:space-between;font-size:12.5px;color:#8b98a9;
    margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07)}
  .foot b{color:#e6edf3}
  .btn{margin-top:13px;text-align:center;padding:11px 0;border-radius:13px;font-weight:700;font-size:13.5px;
    color:#ffb37a;background:linear-gradient(135deg, rgba(255,140,66,0.22), rgba(255,107,157,0.22));
    border:1px solid rgba(255,140,66,0.40)}
  .upd{text-align:right;font-size:10px;color:#48505d;margin-top:8px}
</style>
</head>
<body>
  <div class="card">
    <div class="accent"></div>
    <div class="pad head">
      <span class="t">⛁ Claude 用量<span class="badge">官方即時</span></span>
      <span class="pill">Max (5x)</span>
    </div>
    <div class="pad gauges">
      <div class="g">
        <svg width="92" height="92" viewBox="0 0 92 92">
          <circle cx="46" cy="46" r="32" fill="none" stroke="#0e141d" stroke-width="8.5"/>
          <circle cx="46" cy="46" r="32" fill="none" stroke="#3fb68b" stroke-width="8.5" stroke-linecap="round"
            stroke-dasharray="201.06" stroke-dashoffset="193.0" transform="rotate(-90 46 46)"
            style="filter:drop-shadow(0 0 6px #3fb68baa)"/>
          <text x="46" y="49" text-anchor="middle" fill="#e6edf3" font-size="21" font-weight="750">4%</text>
          <text x="46" y="64" text-anchor="middle" fill="#8b98a9" font-size="9.5">官方即時</text>
        </svg>
        <div class="lab">5 小時視窗</div>
        <div class="sub">約 4.8h 後重置</div>
      </div>
      <div class="g">
        <svg width="92" height="92" viewBox="0 0 92 92">
          <circle cx="46" cy="46" r="32" fill="none" stroke="#0e141d" stroke-width="8.5"/>
          <circle cx="46" cy="46" r="32" fill="none" stroke="#3fb68b" stroke-width="8.5" stroke-linecap="round"
            stroke-dasharray="201.06" stroke-dashoffset="186.99" transform="rotate(-90 46 46)"
            style="filter:drop-shadow(0 0 6px #3fb68baa)"/>
          <text x="46" y="49" text-anchor="middle" fill="#e6edf3" font-size="21" font-weight="750">7%</text>
          <text x="46" y="64" text-anchor="middle" fill="#8b98a9" font-size="9.5">官方即時</text>
        </svg>
        <div class="lab">本週用量</div>
        <div class="sub">約 6.7d 後重置</div>
      </div>
    </div>
    <div class="pad">
      <div class="spark">
        <div style="height:25.3px;opacity:.92"></div>
        <div style="height:22.3px;opacity:.86"></div>
        <div style="height:18.4px;opacity:.79"></div>
        <div style="height:13.6px;opacity:.70"></div>
        <div style="height:18.1px;opacity:.78"></div>
        <div style="height:3.3px;opacity:.56"></div>
        <div style="height:30px;opacity:1"></div>
        <div style="height:15.7px;opacity:.73"></div>
        <div style="height:2px;opacity:.55"></div>
        <div style="height:5.7px;opacity:.58"></div>
        <div style="height:13.7px;opacity:.70"></div>
        <div style="height:8.2px;opacity:.63"></div>
        <div style="height:16.8px;opacity:.76"></div>
        <div style="height:28.1px;opacity:.97"></div>
      </div>
      <div class="cap">近 14 天每日花費</div>
      <div class="foot">
        <span>今日 <b>$188.89</b></span>
        <span>累計等值 <b>$5,566</b></span>
      </div>
      <div class="btn">📊 開啟完整面板</div>
      <div class="upd">更新 15:03</div>
    </div>
  </div>
</body>
</html>
